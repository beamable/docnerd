# docNerd doc generation behavior - controls when to create vs edit
# These rules are passed to Claude to guide documentation updates

# Priority order for doc updates (strict - follow this order)
priority:
  1: "Fix invalidated docs - if the PR changes/removes something that makes existing docs wrong, update those docs"
  2: "Add context to existing docs - if the PR adds info that belongs in an existing page, add it there"
  3: "Create new files - ONLY when no existing doc relates. Be stingy: prefer adding to existing docs."

# When to create new files (stingy - only when nothing else fits)
create_new_files:
  default: prefer_edit  # Always try existing docs first
  only_when:
    - "No existing doc covers the topic or command"
    - "The change introduces a distinct new concept with no natural home"
  never_when:
    - "An existing doc covers deployment, CLI, build, or the same feature area"

# Invalidation detection - what PR changes should trigger doc updates
invalidation_triggers:
  - "API signature changes (params, return values, removal)"
  - "CLI/command changes - new flags, options, or arguments"
  - "MSBuild or .csproj properties that affect builds, containers, or deploy (e.g. ContainerFamily, TargetFramework)"
  - "Dockerfile ARG defaults, docker buildx args, or base image tag behavior"
  - "Config option changes (new, removed, renamed)"
  - "Behavior changes that affect how users use the feature"
  - "Deprecations or removals"
  - "New required steps or changed workflows"

# Voice and style
voice:
  tone: "clear, confident, dense with signal—avoid marketing filler"
  explain_value: true  # Why it matters for real workflows, not slogans
  match_existing: true  # Mirror headings, list style, and terminology of the page you edit
  avoid_superficial: true

# Depth: what "good" looks like (not one-line glossaries)
substance:
  ground_in_pr: "Every claim must come from the PR (diff, code, descriptions)—do not invent flags, paths, or behavior"
  prefer:
    - "Concrete workflows: when a developer runs this, what problem does it solve and in what order"
    - "Non-obvious details: defaults, env vars, prerequisites, failure modes, interaction with other commands"
    - "Subcommands and options that actually changed—name them exactly as in code/CLI"
  avoid:
    - "Generic bullet lists that only restate command names ('beam local run — starts services')"
    - "Placeholder nav links to .md files that are not in the existing doc file list"
    - "Paragraphs that could apply to any CLI without reading the PR"

# Integration with existing docs
integration:
  preserve_existing_structure: true
  match_existing_style: true
  add_to_existing_sections: true  # Prefer adding to existing sections over creating new ones

# Scope per run (avoid touching many pages or full rewrites)
scope:
  default: "Update 1–2 doc pages when possible; at most 3 unless the PR clearly spans separate major areas"
  prefer: "Surgical edits (short subsection, table row, or paragraph)—not whole-page rewrites"
  cross_link: "One canonical explanation; elsewhere use a single sentence + link if needed"
